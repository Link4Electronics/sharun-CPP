name: CI

on:
  push:
    branches:
    - action
    tags:
    - '*'
  workflow_dispatch:

jobs:
  build_static:
    name: sharun-${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [x86_64, aarch64, arm32v7, i386, ppc64le, riscv64]
        include:
          - arch: x86_64
            platform: linux/amd64
            image: alpine:latest
          - arch: aarch64
            platform: linux/arm64
            image: arm64v8/alpine:latest
          - arch: arm32v7
            platform: linux/arm/v7
            image: arm32v7/alpine:latest
          - arch: i386
            platform: linux/386
            image: i386/alpine:latest
          - arch: ppc64le
            platform: linux/ppc64le
            image: ppc64le/alpine:latest
          - arch: riscv64
            platform: linux/riscv64
            image: riscv64/alpine:latest
          - arch: loongarch64
            platform: linux/loong64
            image: loongarch64/alpine:3.21
          - arch: s390x
            platform: linux/s390x
            image: s390x/alpine:latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static binary
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/root" \
            -w /root \
            --platform=${{ matrix.platform }} \
            ${{ matrix.image }} \
            sh -c "
              sed -i 's|https://|http://|g' /etc/apk/repositories
              apk add --no-cache \
                g++ musl-dev zlib-dev cmake make linux-headers \
                bash file binutils patchelf findutils grep sed coreutils \
                strace which wget tar gzip
              apk add --no-cache zlib-static 2>/dev/null || true
              cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=MinSizeRel \
                -DSHARUN_STATIC=ON \
                -DSHARUN_ELF32=ON \
                -DSHARUN_SETENV=ON \
                -DSHARUN_LIB4BIN=ON \
                -DSHARUN_PYINSTALLER=ON
              cmake --build build
              cp build/sharun /root/sharun-${{ matrix.arch }}
              strip --strip-all /root/sharun-${{ matrix.arch }}
              # Lite build (no features)
              cmake -S . -B build-lite \
                -DCMAKE_BUILD_TYPE=MinSizeRel \
                -DSHARUN_STATIC=ON \
                -DSHARUN_ELF32=OFF \
                -DSHARUN_SETENV=OFF \
                -DSHARUN_LIB4BIN=OFF \
                -DSHARUN_PYINSTALLER=OFF
              cmake --build build-lite
              cp build-lite/sharun /root/sharun-${{ matrix.arch }}-lite
              strip --strip-all /root/sharun-${{ matrix.arch }}-lite
            "

      - name: super-strip (sstrip)
        run: |
          (git clone https://github.com/aunali1/super-strip.git && cd super-strip
          make
          sudo mv -fv sstrip /usr/bin/)
          sstrip sharun-${{ matrix.arch }}* 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sharun-${{ matrix.arch }}
          path: sharun-${{ matrix.arch }}*

  build_glibc:
    name: sharun-${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [ppc64]
        include:
          - arch: ppc64
            image: kth5/archpower:latest-ppc64
    steps:
      - name: Install QEMU user-mode
        run: |
          sudo apt update && sudo apt install -y qemu-user-static binfmt-support

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in QEMU chroot
        run: |
          # Extract the ppc64 Docker image filesystem to workspace (more space than /tmp)
          docker create --name ppc64src ${{ matrix.image }} /bin/true
          sudo mkdir -p ${{ github.workspace }}/ppc64-rootfs
          docker export ppc64src | sudo tar xf - -C ${{ github.workspace }}/ppc64-rootfs
          docker rm ppc64src
          # Clean pacman cache, then disable problematic features
          sudo rm -rf ${{ github.workspace }}/ppc64-rootfs/var/cache/pacman/pkg/*
          sudo sed -i 's/^DownloadUser/#DownloadUser/' ${{ github.workspace }}/ppc64-rootfs/etc/pacman.conf
          sudo sed -i 's/^#DisableSandbox/DisableSandbox/' ${{ github.workspace }}/ppc64-rootfs/etc/pacman.conf
          sudo sed -i 's/^SigLevel.*/SigLevel = Never/' ${{ github.workspace }}/ppc64-rootfs/etc/pacman.conf
          sudo sed -i 's/^LocalFileSigLevel.*/LocalFileSigLevel = Never/' ${{ github.workspace }}/ppc64-rootfs/etc/pacman.conf
          sudo touch ${{ github.workspace }}/ppc64-rootfs/etc/mtab
          # Mount /proc and a tmpfs for pacman cache (statvfs fails under QEMU user-mode otherwise)
          sudo mkdir -p ${{ github.workspace }}/ppc64-rootfs/proc \
                        ${{ github.workspace }}/ppc64-rootfs/var/cache/pacman/pkg
          sudo mount --bind /proc ${{ github.workspace }}/ppc64-rootfs/proc
          sudo mount -t tmpfs -o size=2G tmpfs ${{ github.workspace }}/ppc64-rootfs/var/cache/pacman/pkg
          # Copy QEMU static binary and host DNS config into the rootfs
          sudo cp /usr/bin/qemu-ppc64-static ${{ github.workspace }}/ppc64-rootfs/usr/bin/
          sudo cp /etc/resolv.conf ${{ github.workspace }}/ppc64-rootfs/etc/
          # Copy source code
          sudo mkdir -p ${{ github.workspace }}/ppc64-rootfs/build/src
          sudo cp -r src ${{ github.workspace }}/ppc64-rootfs/build/
          sudo cp CMakeLists.txt embed_compress.c lib4bin ${{ github.workspace }}/ppc64-rootfs/build/
          # Build inside chroot — pacman -S (install) fails because statvfs("/")
          # breaks under QEMU user-mode. Use -Sw (download only), then extract manually.
          sudo chroot ${{ github.workspace }}/ppc64-rootfs /bin/bash -c "
            pacman -Sy --noconfirm && \
            pacman -Sw --noconfirm gcc make cmake zlib && \
            for pkg in /var/cache/pacman/pkg/*.pkg.tar.*; do
              tar --zstd -xf \"\$pkg\" -C / 2>/dev/null || tar -xf \"\$pkg\" -C / 2>/dev/null || true
            done
            cd /build
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -DSHARUN_STATIC=ON \
              -DSHARUN_ELF32=ON \
              -DSHARUN_SETENV=ON \
              -DSHARUN_LIB4BIN=ON \
              -DSHARUN_PYINSTALLER=ON
            cmake --build build
            cp build/sharun /sharun-${{ matrix.arch }}
            strip --strip-all /sharun-${{ matrix.arch }}
            # Lite build
            cmake -S . -B build-lite \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -DSHARUN_STATIC=ON \
              -DSHARUN_ELF32=OFF \
              -DSHARUN_SETENV=OFF \
              -DSHARUN_LIB4BIN=OFF \
              -DSHARUN_PYINSTALLER=OFF
            cmake --build build-lite
            cp build-lite/sharun /sharun-${{ matrix.arch }}-lite
            strip --strip-all /sharun-${{ matrix.arch }}-lite
          "
          sudo cp ${{ github.workspace }}/ppc64-rootfs/sharun-* .
          sudo chown $(id -u):$(id -g) sharun-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sharun-${{ matrix.arch }}
          path: sharun-${{ matrix.arch }}*

  release:
    name: release
    if: github.ref_name == 'action' || startsWith(github.ref, 'refs/tags/')
    needs: [build_static, build_glibc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Collect files
        run: |
          find /tmp/artifacts -type f -exec cp {} . \;

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: sharun*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (branch push)
        if: github.ref_name == 'action'
        uses: softprops/action-gh-release@v1
        with:
          files: sharun*
          tag_name: ${{ github.sha }}
          name: Build ${{ github.sha }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
